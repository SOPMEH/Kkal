// ───────────────── Состояние и хранение
const LS_KEY="kkal_v1";
function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{} }catch(e){ return {} } }
let saved=load();
let S={
  goal: saved.goal||2200,
  entries: saved.entries||{},          // {dateKey:[{id,mealId,name,grams,kcal100,p100,f100,c100}]}
  provider: saved.provider||"groq",    // groq | gemini
  apiKey: saved.apiKey||"",
};
function persist(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

// ───────────────── Утилиты

const same=(a,b)=>dk(a)===dk(b);
const R=Math.round;
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function dayItems(d){ return S.entries[dk(d)]||[]; }
function dayKcal(d){ return dayItems(d).reduce((s,i)=>s+i.kcal100*i.grams/100,0); }
function totals(d){ return dayItems(d).reduce((t,i)=>{const k=i.grams/100;t.kcal+=i.kcal100*k;t.p+=i.p100*k;t.f+=i.f100*k;t.c+=i.c100*k;return t;},{kcal:0,p:0,f:0,c:0}); }

function addItem(mealId,name,grams,k,p,f,c){
  const key=dk(selected);
  const arr=S.entries[key]?S.entries[key].slice():[];
  arr.push({id:Date.now()+""+Math.floor(Math.random()*1e4),mealId,name,grams,kcal100:k,p100:p,f100:f,c100:c});
  S.entries[key]=arr; persist();
}
function updateGrams(id,g){ const key=dk(selected); S.entries[key]=S.entries[key].map(i=>i.id===id?{...i,grams:g}:i); persist(); }
function removeItem(id){ const key=dk(selected); S.entries[key]=S.entries[key].filter(i=>i.id!==id); persist(); }

// ───────────────── Главный экран

  const t=totals(selected);

  const today=new Date();
  const title=same(selected,today)?"Сегодня":selected.getDate()+" "+MONTHS[selected.getMonth()];

  // неделя
  const start=new Date(selected); start.setDate(start.getDate()-((start.getDay()+6)%7));
  let week="";
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const sel=same(d,selected), k=dayKcal(d);
    week+=`<button class="wday${sel?" sel":""}" onclick="pickDay('${d.toISOString()}')">

      <span class="dot" style="background:${k>0?"var(--accent)":"transparent"}"></span></button>`;
  }

  const macros=[["Белки",t.p,mg.p,"#4A7DBE"],["Жиры",t.f,mg.f,"#D9A441"],["Углеводы",t.c,mg.c,"#B06AC4"]]
    .map(([l,v,m,col])=>`<div><div class="macro-row"><span class="lbl">${l}</span><span><b>${R(v)}</b><span class="of"> / ${m} г</span></span></div>
      <div class="bar"><div style="width:${Math.min(100,v/m*100)}%;background:${col}"></div></div></div>`).join("");

  const meals=MEALS.map(m=>{
    const items=dayItems(selected).filter(i=>i.mealId===m.id);
    const mk=items.reduce((s,i)=>s+i.kcal100*i.grams/100,0);
    const rows=items.map(i=>`<button class="item" onclick="openEdit('${i.id}')">
      <div><div class="item-name">${esc(i.name)}</div><div class="item-g">${i.grams} г</div></div>
      <div class="item-k">${R(i.kcal100*i.grams/100)}</div></button>`).join("");
    return `<div class="meal"><div class="meal-head"><div><span class="meal-title">${m.label}</span>${mk>0?`<span class="meal-kcal">${R(mk)} ккал</span>`:""}</div>
      <button class="add-btn" onclick="openAdd('${m.id}')">+</button></div>
      ${rows||'<div class="meal-empty">Пока пусто — нажмите «+», чтобы добавить</div>'}</div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
  <div class="header">
    <button class="h-date" onclick="openCalendar()">
      <div class="h-title">${title}</div>
      <div class="h-sub">${MONTHS_NOM[selected.getMonth()]} ${selected.getFullYear()} · календарь ▾</div>
    </button>
    <div class="h-actions">
      <button class="chip" onclick="openGoal()">цель ${S.goal}</button>
      <button class="chip" onclick="openSettings()">⚙</button>
    </div>
  </div>
  <div class="week">${week}</div>
  <div class="summary">
    <div class="ringwrap">
      <svg width="190" height="190" viewBox="0 0 190 190">
        <circle cx="95" cy="95" r="84" fill="none" stroke="var(--surface)" stroke-width="11"/>
        <circle cx="95" cy="95" r="84" fill="none" stroke="${over?"var(--warn)":"var(--accent)"}" stroke-width="11"
          stroke-linecap="round" stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC*(1-pct)}"
          style="transition:stroke-dashoffset .6s ease"/>
      </svg>
      <div class="ring-center">
        <div class="big-num">${R(t.kcal)}</div>
        <div class="ring-sub">${over?"+"+R(t.kcal-S.goal)+" сверх цели":"осталось "+R(Math.max(0,S.goal-t.kcal))}</div>
      </div>
    </div>
    <div class="macros">${macros}</div>
  </div>
  <div class="meals">${meals}
    <div class="footnote">Данные хранятся на этом телефоне. AI-оценка калорий по фото — приблизительная.</div>
  </div>`;
}

function gramsPickerHTML(name,grams,portion,kcal100,opts){

  const halves=[R(portion/2),portion,portion*2];
  return `${opts.back?`<button class="back-link" onclick="${opts.back}">← назад к поиску</button>`:""}
  <div style="font-size:17px;font-weight:600">${esc(name)}</div>
  <div style="font-size:13px;color:var(--muted);margin:2px 0 18px">${R(kcal100)} ккал на 100 г</div>
  <div class="grams-row">
    <button class="stepper" onclick="${opts.bump}(-25)">−25</button>
    <button class="stepper" onclick="${opts.bump}(-5)">−5</button>
    <div style="min-width:110px;text-align:center"><div class="grams-num">${grams}</div><div class="grams-lbl">граммов</div></div>
    <button class="stepper" onclick="${opts.bump}(5)">+5</button>
    <button class="stepper" onclick="${opts.bump}(25)">+25</button>
  </div>
  <div class="portions">
    ${halves.map((g,i)=>`<button class="portion${grams===g?" on":""}" onclick="${opts.setG}(${g})">${["½ порции","1 порция","2 порции"][i]}<br><span>${g} г</span></button>`).join("")}
  </div>
  <button class="primary" onclick="${opts.confirm}">${opts.confirmLabel||"Добавить"} · ${kcal} ккал</button>
  ${opts.del?`<button class="danger" onclick="${opts.del}">Удалить запись</button>`:""}`;
}

function renderSearchList(){
  const box=document.getElementById("searchList"); if(!box)return;
  const q=addCtx.query.trim().toLowerCase();
  const res=q?FOOD_DB.filter(f=>f.name.toLowerCase().includes(q)).slice(0,30):FOOD_DB.slice(0,12);
  box.innerHTML=res.length?res.map(f=>`<button class="food-row" onclick="pickFood('${f.id}')">
    <div><div class="food-name">${esc(f.name)}</div><div class="food-bju">Б ${f.p} · Ж ${f.f} · У ${f.c}</div></div>
    <div class="food-k"><b>${f.kcal}</b> /100 г</div></button>`).join("")
  :`<div class="empty-msg">Ничего не нашлось. Попробуйте сфотографировать — AI оценит сам.</div>`;
}

function renderAdd(){
  const meal=MEALS.find(m=>m.id===addCtx.mealId);
  let body="";
  if(addCtx.tab==="search"){
    if(addCtx.picked){
      body=gramsPickerHTML(addCtx.picked.food.name,addCtx.picked.grams,addCtx.picked.food.portion,addCtx.picked.food.kcal,
        {back:"backToSearch()",bump:"bumpPicked",setG:"setPickedG",confirm:"confirmPicked()"});
    } else {
      body=`<input class="search-input" placeholder="Гречка, борщ, сырники…" value="${esc(addCtx.query)}" oninput="setQuery(this.value)" autofocus>
        <div id="searchList"></div>`;
    }
  } else {
    body=renderPhotoBody();
  }
  showSheet(`<div class="sheet-title">Добавить в ${meal.label.toLowerCase()}</div>
    <div class="tabs">
      <button class="tab${addCtx.tab==="search"?" on":""}" onclick="setTab('search')">Поиск</button>
      <button class="tab${addCtx.tab==="photo"?" on":""}" onclick="setTab('photo')">Фото · AI</button>
    </div>${body}`);
  if(addCtx.tab==="search"&&!addCtx.picked){ renderSearchList(); const inp=document.querySelector(".search-input"); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);} }
}

// ── Фото / AI
function renderPhotoBody(){
  if(!S.apiKey){
    return `<div style="text-align:center;padding:30px 10px">
      <div class="photo-emoji">🔑</div>
      <div class="photo-t">Нужен бесплатный AI-ключ</div>
      <div class="photo-s" style="margin-bottom:18px">Один раз вставьте ключ Groq или Gemini в настройках — и фото-распознавание заработает</div>
      <button class="primary dark" style="width:auto;padding:13px 28px" onclick="openSettings()">Открыть настройки</button></div>`;
  }
  if(aiCtx.status==="idle"){
    return `<button class="photo-drop" onclick="document.getElementById('photoInput').click()">
      <div class="photo-emoji">📷</div><div class="photo-t">Сфотографируйте еду</div>
      <div class="photo-s">AI определит блюда, граммовку и калории</div></button>`;
  }
  if(aiCtx.status==="loading"){
    return `<div style="text-align:center;padding:44px 20px">
      <div style="font-size:30px;animation:pulse 1.2s infinite">🔎</div>
      <div class="photo-t" style="margin-top:12px">Анализирую фото…</div>
      <div class="photo-s">Обычно 5–10 секунд</div></div>`;
  }
  if(aiCtx.status==="error"){
    return `<div class="err">${esc(aiCtx.error)}</div>
      <button class="primary dark" onclick="resetAI()">Попробовать снова</button>`;
  }
  // done
  const total=aiCtx.items.filter(i=>i.checked).reduce((s,i)=>s+i.kcal100*i.grams/100,0);
  const any=aiCtx.items.some(i=>i.checked);
  const rows=aiCtx.items.map((it,idx)=>`<div class="ai-item${it.checked?"":" off"}">
    <div class="ai-head">
      <button class="ai-check" onclick="toggleAI(${idx})"><span class="cb${it.checked?" on":""}">${it.checked?"✓":""}</span>
        <span style="font-size:14.5px;font-weight:500">${esc(it.name)}</span></button>
      <span style="font-size:14px;font-weight:600">${R(it.kcal100*it.grams/100)} ккал</span>
    </div>
    ${it.checked?`<div class="ai-grams">
      <button class="stepper sm" onclick="bumpAI(${idx},-25)">−25</button>
      <button class="stepper sm" onclick="bumpAI(${idx},-10)">−10</button>
      <div class="g">${it.grams} г</div>
      <button class="stepper sm" onclick="bumpAI(${idx},10)">+10</button>
      <button class="stepper sm" onclick="bumpAI(${idx},25)">+25</button></div>`:""}
  </div>`).join("");
  return `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Распознано — проверьте и поправьте граммовку:</div>
    ${rows}
    <button class="primary dark" style="margin-top:8px" ${any?"":"disabled"} onclick="confirmAI()">Добавить · ${R(total)} ккал</button>
    <button class="ghost" onclick="resetAI()">Сфотографировать заново</button>`;
}
window.resetAI=()=>{ aiCtx={status:"idle",items:[],error:null}; renderAdd(); };
window.toggleAI=i=>{ aiCtx.items[i].checked=!aiCtx.items[i].checked; renderAdd(); };
window.bumpAI=(i,d)=>{ aiCtx.items[i].grams=Math.max(5,aiCtx.items[i].grams+d); renderAdd(); };
window.confirmAI=()=>{ aiCtx.items.filter(i=>i.checked).forEach(i=>addItem(addCtx.mealId,i.name,i.grams,i.kcal100,i.p100,i.f100,i.c100)); closeSheet(); };

document.getElementById("photoInput").addEventListener("change",e=>{
  const f=e.target.files&&e.target.files[0]; e.target.value="";
  if(f&&addCtx) analyzePhoto(f);
});

function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const max=1024; let w=img.width,h=img.height;
      if(Math.max(w,h)>max){ const k=max/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const dataUrl=cv.toDataURL("image/jpeg",0.8);
      res({dataUrl,base64:dataUrl.split(",")[1]});
    };
    img.onerror=()=>rej(new Error("bad image"));
    img.src=URL.createObjectURL(file);
  });
}

const AI_PROMPT=`Определи еду на фото и оцени её пищевую ценность. Ответь ТОЛЬКО валидным JSON без markdown и пояснений, в формате:
{"items":[{"name":"название блюда по-русски","grams":число_граммов_на_фото,"kcal100":ккал_на_100г,"p100":белки_на_100г,"f100":жиры_на_100г,"c100":углеводы_на_100г}]}
Если еды на фото нет, верни {"items":[]}. Оценивай реалистично, граммовку — по видимому размеру порции.`;

async function analyzePhoto(file){
  aiCtx={status:"loading",items:[],error:null}; renderAdd();
  try{
    const {dataUrl,base64}=await compressImage(file);
    let text="";
    if(S.provider==="groq"){
      const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.apiKey},
        body:JSON.stringify({
          model:"meta-llama/llama-4-scout-17b-16e-instruct",
          max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"text",text:AI_PROMPT},
            {type:"image_url",image_url:{url:dataUrl}}]}],
        }),
      });
      if(r.status===401) throw new Error("Неверный API-ключ. Проверьте его в настройках.");
      if(r.status===429) throw new Error("Лимит запросов исчерпан, подождите минуту.");
      const data=await r.json();
      if(data.error) throw new Error("Groq: "+(data.error.message||"ошибка"));
      text=data.choices[0].message.content;
    } else {
      const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+encodeURIComponent(S.apiKey),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[
          {text:AI_PROMPT},
          {inline_data:{mime_type:"image/jpeg",data:base64}}]}]}),
      });
      if(r.status===400||r.status===403) throw new Error("Неверный API-ключ. Проверьте его в настройках.");
      if(r.status===429) throw new Error("Лимит запросов исчерпан, подождите минуту.");
      const data=await r.json();
      if(data.error) throw new Error("Gemini: "+(data.error.message||"ошибка"));
      text=data.candidates[0].content.parts.map(p=>p.text||"").join("\n");
    }
    const clean=text.replace(/```json|```/g,"").trim();
    const m=clean.match(/\{[\s\S]*\}/);
    const parsed=JSON.parse(m?m[0]:clean);
    if(!parsed.items||!parsed.items.length){
      aiCtx={status:"error",items:[],error:"Не удалось распознать еду на фото. Попробуйте другой ракурс."};
    } else {
      aiCtx={status:"done",error:null,items:parsed.items.map((it,i)=>({
        id:"ai"+i,name:String(it.name||"Блюдо"),grams:Math.max(5,R(+it.grams||100)),
        kcal100:+it.kcal100||0,p100:+it.p100||0,f100:+it.f100||0,c100:+it.c100||0,checked:true}))};
    }
  }catch(e){
    aiCtx={status:"error",items:[],error:e.message&&e.message.length<120?e.message:"Ошибка анализа. Проверьте интернет и ключ в настройках."};
  }
  if(addCtx) renderAdd();
}

// ── Редактирование записи
window.openEdit=id=>{
  const it=dayItems(selected).find(x=>x.id===id); if(!it)return;
  editCtx={item:{...it}};
  renderEdit();
};
function renderEdit(){
  const it=editCtx.item;
  showSheet(gramsPickerHTML(it.name,it.grams,it.grams<=10?10:it.grams, it.kcal100,
    {bump:"bumpEdit",setG:"setEditG",confirm:"confirmEdit()",del:"deleteEdit()",confirmLabel:"Сохранить"}));
}
window.bumpEdit=d=>{ editCtx.item.grams=Math.max(5,editCtx.item.grams+d); renderEdit(); };
window.setEditG=g=>{ editCtx.item.grams=g; renderEdit(); };
window.confirmEdit=()=>{ updateGrams(editCtx.item.id,editCtx.item.grams); closeSheet(); };
window.deleteEdit=()=>{ removeItem(editCtx.item.id); closeSheet(); };

// ── Календарь
window.openCalendar=()=>{ calView=new Date(selected.getFullYear(),selected.getMonth(),1); renderCalendar(); };
window.calShift=d=>{ calView=new Date(calView.getFullYear(),calView.getMonth()+d,1); renderCalendar(); };
window.calPick=iso=>{ selected=new Date(iso); closeSheet(); };
function renderCalendar(){
  const today=new Date();
  const startPad=(new Date(calView.getFullYear(),calView.getMonth(),1).getDay()+6)%7;
  const daysIn=new Date(calView.getFullYear(),calView.getMonth()+1,0).getDate();
  let cells="";
  for(let i=0;i<startPad;i++) cells+="<div></div>";
  for(let n=1;n<=daysIn;n++){
    const d=new Date(calView.getFullYear(),calView.getMonth(),n);
    const k=dayKcal(d), ratio=k/S.goal;
    const cls="cal-day"+(same(d,selected)?" sel":"")+(same(d,today)?" today":"");
    cells+=`<button class="${cls}" onclick="calPick('${d.toISOString()}')">
      <span class="n">${n}</span>
      <span class="d" style="background:${k===0?"transparent":ratio>1.1?"var(--warn)":"var(--accent)"}"></span></button>`;
  }
  showSheet(`<div class="cal-nav">
      <button class="cal-arrow" onclick="calShift(-1)">‹</button>
      <div class="cal-month">${MONTHS_NOM[calView.getMonth()]} ${calView.getFullYear()}</div>
      <button class="cal-arrow" onclick="calShift(1)">›</button></div>
    <div class="cal-grid" style="margin-bottom:6px">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
    <div class="legend"><span><i style="background:var(--accent)"></i>в норме</span><span><i style="background:var(--warn)"></i>перебор</span></div>`);
}

// ── Цель

window.bumpGoal=d=>{ goalTmp=Math.max(800,goalTmp+d); renderGoal(); };
window.setGoalV=g=>{ goalTmp=g; renderGoal(); };
window.saveGoal=()=>{ S.goal=goalTmp; persist(); closeSheet(); };
function renderGoal(){

      :"Получить бесплатно: <b>aistudio.google.com</b> → Get API key. Бесплатного лимита хватает с запасом."}</div>
